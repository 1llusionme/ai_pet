name: ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: python -m pip install -r server/requirements.txt
      - name: Run backend tests
        run: python -m unittest discover -s server/tests -p "test_*.py"

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs/idea2mvp/年轻人风格原型设计
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/idea2mvp/年轻人风格原型设计/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
